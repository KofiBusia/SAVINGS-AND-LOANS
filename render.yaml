databases:
  - name: ghana-savings-loans-db
    databaseName: savings_loans_ghana
    user: slapp_user
    plan: free

services:
  # ── API (demo-server.js) ────────────────────────────────────────────────────
  - type: web
    name: ghana-savings-loans-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: node demo-server.js
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GHANA_DATA_REGION
        value: gh-accra-1
      - key: DATABASE_URL
        fromDatabase:
          name: ghana-savings-loans-db
          property: connectionString

  # ── Front-Office (Next.js) ──────────────────────────────────────────────────
  - type: web
    name: ghana-savings-loans-front
    runtime: node
    rootDir: front-office
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: ghana-savings-loans-api
          type: web
          property: url
