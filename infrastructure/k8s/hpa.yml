apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: back-office-hpa
  namespace: savings-loans-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: back-office
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      # Scale up fast for Ghana festive season / salary week peaks
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      # Scale down slowly to avoid flapping
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: front-office-hpa
  namespace: savings-loans-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: front-office
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
